name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: concierge
          POSTGRES_USER: concierge
          POSTGRES_PASSWORD: concierge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U concierge -d concierge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      BOT_TOKEN: 123456:test-token
      ADMIN_IDS: "1"
      REVIEWER_CHAT_IDS: "1"
      DATABASE_URL: postgresql+asyncpg://concierge:concierge@localhost:5432/concierge
      POSTGRES_DB: concierge
      POSTGRES_USER: concierge
      POSTGRES_PASSWORD: concierge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Validate bundled database Compose config
        run: docker compose config

      - name: Validate external database Compose config
        run: docker compose -f compose.external-db.yaml config

      - name: Compile Python modules
        run: python -m compileall -q .

      - name: Apply migrations to clean PostgreSQL
        run: alembic upgrade head && alembic current

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run smoke check
        run: python -m scripts.smoke_check

      - name: Run no-polling preflight check
        run: python -m scripts.preflight_check
