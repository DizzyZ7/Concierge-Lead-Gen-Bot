services:
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      BOT_TOKEN: ${BOT_TOKEN:?Set BOT_TOKEN in .env or environment}
      ADMIN_IDS: ${ADMIN_IDS:?Set ADMIN_IDS in .env or environment}
      REVIEWER_CHAT_IDS: ${REVIEWER_CHAT_IDS:-}
      REVIEWER_USER_IDS: ${REVIEWER_USER_IDS:-}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env or environment}
      TIMEZONE: ${TIMEZONE:-Asia/Bangkok}
      AUTO_APPROVE: ${AUTO_APPROVE:-false}
      REVIEWER_MODE: ${REVIEWER_MODE:-true}
      AUTOMATION_LEVEL: ${AUTOMATION_LEVEL:-assisted}
      OUTBOUND_ENABLED: ${OUTBOUND_ENABLED:-false}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-haiku-20241022}
      RELEVANCE_THRESHOLD: ${RELEVANCE_THRESHOLD:-0.65}
      PARSER_ENABLED: ${PARSER_ENABLED:-false}
      PARSER_INTERVAL_MINUTES: ${PARSER_INTERVAL_MINUTES:-10}
      PARSER_LIMIT_PER_CHANNEL: ${PARSER_LIMIT_PER_CHANNEL:-20}
      TG_API_ID: ${TG_API_ID:-}
      TG_API_HASH: ${TG_API_HASH:-}
      TG_PHONE: ${TG_PHONE:-}
      TG_SESSION_NAME: ${TG_SESSION_NAME:-concierge_session}
    volumes:
      - ./sessions:/app/sessions
